<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaChahome - Apps</title>
  <script>
    // Apply saved theme before paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <svg class="spinner-icon" width="40" height="40" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="url(#load-grad)"/>
        <path d="M8 20V14L16 9L24 14V20L16 25L8 20Z" stroke="white" stroke-width="2" fill="none"/>
        <path d="M16 15V21" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="13" r="2" fill="white"/>
        <defs>
          <linearGradient id="load-grad" x1="0" y1="0" x2="32" y2="32">
            <stop stop-color="#6366F1"/>
            <stop offset="1" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Main content -->
  <div class="app-shell" id="appShell">
    <!-- Header -->
    <header class="app-header">
      <div class="container header-inner">
        <a href="/app/" class="logo">
          <svg class="logo-icon" width="30" height="30" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
            <path d="M8 20V14L16 9L24 14V20L16 25L8 20Z" stroke="white" stroke-width="2" fill="none"/>
            <path d="M16 15V21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="16" cy="13" r="2" fill="white"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#6366F1"/>
                <stop offset="1" stop-color="#8B5CF6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">ChaChahome</span>
        </a>

        <div class="header-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>
          </svg>
          <input id="appFilter" type="search" placeholder="앱 검색" aria-label="앱 검색" autocomplete="off">
          <kbd aria-hidden="true">/</kbd>
        </div>

        <div class="header-right">
          <span class="user-greeting" id="userEmail"></span>
          <button class="btn-icon-link theme-toggle" id="themeToggle" type="button" aria-label="테마 전환" title="테마 전환">
            <svg class="theme-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
            </svg>
            <svg class="theme-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
            </svg>
          </button>
          <a class="btn-icon-link admin-link" id="adminLink" href="/app/admin/" aria-label="관리자 콘솔" title="관리자 콘솔" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </a>
          <button class="btn-icon-link" id="logoutBtn" type="button" aria-label="로그아웃" title="로그아웃">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page body -->
    <main class="app-main">
      <div class="container">
        <div class="welcome-section anim-entry" style="--delay: 0">
          <h1 class="welcome-title">내 앱<span class="welcome-count" id="appCount" aria-hidden="true"></span></h1>
          <p class="welcome-desc">열고 싶은 서비스를 고르세요.</p>
        </div>

        <!-- Category bands are rendered here from /auth/apps -->
        <div class="app-bands anim-entry" id="appBands" style="--delay: 1"></div>

        <div class="empty-state" id="noResults" hidden>
          <h2 class="empty-state-title">검색 결과 없음</h2>
          <p class="empty-state-desc">‘<span id="noResultsQuery"></span>’에 맞는 앱이 없어요.</p>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <h2 class="empty-state-title">사용할 수 있는 앱이 없어요</h2>
          <p class="empty-state-desc">로그인은 되지만 아직 앱 권한이 없습니다. 관리자에게 접근 권한을 요청하세요.</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="container">
        <p>© 2026 ChaChahome</p>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
