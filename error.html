<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#6366F1">
  <title>일시적인 오류가 발생했습니다 - ChaChahome</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-primary: #6366F1;
      --color-primary-dark: #4F46E5;
      --color-secondary: #8B5CF6;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #111827;
      --color-text-secondary: #6B7280;
      --color-border: #E5E7EB;
      --font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-family);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.08), transparent 40%);
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: #fff;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }

    .btn-outline {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-outline:hover { background: var(--color-bg); border-color: var(--color-text-secondary); }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      color: var(--color-text);
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <main class="card">
    <a href="/" class="logo" aria-label="ChaChahome 홈으로">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="url(#logo-grad)" />
        <path d="M8 20V14L16 9L24 14V20L16 25L8 20Z" stroke="white" stroke-width="2" fill="none" />
        <path d="M16 15V21" stroke="white" stroke-width="2" stroke-linecap="round" />
        <circle cx="16" cy="13" r="2" fill="white" />
        <defs>
          <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
            <stop stop-color="#6366F1" />
            <stop offset="1" stop-color="#8B5CF6" />
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">ChaChahome</span>
    </a>

    <div class="icon-wrap" aria-hidden="true">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
        <path d="M12 8V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <circle cx="12" cy="16" r="1" fill="currentColor" />
      </svg>
    </div>

    <h1>일시적인 오류가 발생했습니다</h1>
    <p>잠시 후 다시 시도해 주세요.<br>문제가 계속되면 관리자에게 문의해 주세요.</p>

    <div class="actions">
      <a href="/oauth2/sign_in" class="btn btn-primary">다시 로그인</a>
      <a href="/" class="btn btn-outline">홈으로 돌아가기</a>
    </div>
  </main>
</body>

</html>
